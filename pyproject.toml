[project]
name = "lichtfeld-360-plugin"
version = "0.1.0"
description = "360° camera to Gaussian Splat — one-click pipeline with rig-aware COLMAP alignment"
readme = "README.md"
requires-python = ">=3.12,<3.13"
license = { text = "GPL-3.0-or-later" }
authors = [{name = "Alex Gee"}]
dependencies = [
    "opencv-python-headless",
    "numpy",
    "pycolmap",
    "static-ffmpeg",
]

[project.urls]
Repository = "https://github.com/alexmgee/lichtfeld-360-plugin"
Issues = "https://github.com/alexmgee/lichtfeld-360-plugin/issues"

[project.optional-dependencies]
dev = [
    "pytest",
]

[tool.uv.sources]
pycolmap = [
  { url = "https://github.com/lyehe/build_gpu_colmap/releases/download/v4.0.2/pycolmap-4.0.2%2Bcuda-cp312-cp312-win_amd64.whl", marker = "sys_platform == 'win32' and python_version == '3.12'" },
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.lichtfeld]
hot_reload = true
plugin_api = ">=1,<2"
lichtfeld_version = ">=0.5.0"
required_features = []
